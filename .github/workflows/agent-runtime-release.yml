name: Agent Runtime Release Gate

# Release 只能由受保护 tag 或人工触发；缺外部 evidence 时本地 CLI 会 fail-closed。
"on":
  push:
    tags:
      - phase15-release-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    name: protected 48-case release gate
    runs-on: ubuntu-latest
    environment: phase15-release
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: phase15-local
          POSTGRES_DB: live_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d live_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: phase15-local
      POSTGRES_DB: live_agent
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      PHASE15_REAL_MODEL: "0"
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          # Release 回归同样执行历史闭包校验，不能因默认浅检出遗漏不可变执行事实。
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run migrations and complete infrastructure tests
        run: |
          python scripts/run_db_migrations.py
          python - <<'PY'
          import socket
          import sys
          import time
          for host, port in (("localhost", 2181), ("localhost", 9092)):
              for _ in range(30):
                  try:
                      with socket.create_connection((host, port), timeout=1):
                          break
                  except OSError:
                      time.sleep(2)
              else:
                  print(f"service unavailable: {host}:{port}", file=sys.stderr)
                  raise SystemExit(3)
          PY
          # Release 复用官方 PostgresSaver 的公开集成路径，不读私有 checkpoint 表。
          python -m pytest tests/integration/test_phase12a_plan_checkpoint_consistency.py -q
          python -m pytest tests/unit -q
          python -m pytest tests/integration -q
      - name: Run release coverage gate
        run: |
          coverage run --branch -m pytest tests/unit tests/integration -q
          coverage json
          python scripts/check_coverage_gate.py --coverage-file coverage.json --line 90 --branch 85
      - name: Verify protected hosted Actions evidence
        env:
          PHASE15_EVIDENCE_JSON: ${{ secrets.PHASE15_EVIDENCE_JSON }}
          PHASE15_EVIDENCE_REPO: ${{ secrets.PHASE15_EVIDENCE_REPO }}
          PHASE15_EVIDENCE_RUN_ID: ${{ secrets.PHASE15_EVIDENCE_RUN_ID }}
          PHASE15_EVIDENCE_WORKFLOW: ${{ secrets.PHASE15_EVIDENCE_WORKFLOW }}
          PHASE15_EVIDENCE_COMMIT_SHA: ${{ secrets.PHASE15_EVIDENCE_COMMIT_SHA }}
          PHASE15_EVIDENCE_ARTIFACT_DIGEST: ${{ secrets.PHASE15_EVIDENCE_ARTIFACT_DIGEST }}
        run: |
          test -n "$PHASE15_EVIDENCE_JSON"
          printf '%s' "$PHASE15_EVIDENCE_JSON" > "$RUNNER_TEMP/phase15-actions-evidence.json"
          python scripts/fetch_github_actions_evidence.py \
            --evidence-file "$RUNNER_TEMP/phase15-actions-evidence.json" \
            --require-evidence \
            --repo "$PHASE15_EVIDENCE_REPO" \
            --run-id "$PHASE15_EVIDENCE_RUN_ID" \
            --workflow "$PHASE15_EVIDENCE_WORKFLOW" \
            --commit-sha "$PHASE15_EVIDENCE_COMMIT_SHA" \
            --artifact-digest "$PHASE15_EVIDENCE_ARTIFACT_DIGEST"
      - name: Run 48 full release cases
        run: |
          echo "48 full cases; external Actions evidence remains required"
          python scripts/run_release_gate.py \
            --mode release \
            --database-url "postgresql://postgres:phase15-local@localhost:5432/live_agent" \
            --coverage-file coverage.json \
            --evidence-file "$RUNNER_TEMP/phase15-actions-evidence.json" \
            --repo "$PHASE15_EVIDENCE_REPO" \
            --run-id "$PHASE15_EVIDENCE_RUN_ID" \
            --workflow "$PHASE15_EVIDENCE_WORKFLOW" \
            --commit-sha "$PHASE15_EVIDENCE_COMMIT_SHA" \
            --artifact-digest "$PHASE15_EVIDENCE_ARTIFACT_DIGEST" \
            --output-dir artifacts/release-48-full
      - name: Upload release gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase15-release-gate
          path: artifacts/release-48-full
          if-no-files-found: error
          retention-days: 180
