name: Agent Runtime PR Gate

# PR 只验证非 holdout 的 36 个 case，禁止把模型密钥带入不受保护的执行环境。
"on":
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pr-gate:
    name: deterministic PR gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: phase15-local
          POSTGRES_DB: live_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d live_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # PR 会执行真实 Kafka 集成用例；显式启动独立协调服务，避免依赖开发机 broker。
      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: phase15-local
      POSTGRES_DB: live_agent
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      PHASE15_REAL_MODEL: "0"
    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          # Phase 16 的历史闭包审计需要读取正式执行提交的 Git blob，浅检出会缺失该对象。
          fetch-depth: 0
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run database migrations and wait for Kafka
        run: |
          python scripts/run_db_migrations.py
          python - <<'PY'
          import socket
          import sys
          import time

          # 服务容器的启动顺序不等于 broker 已可接收客户端连接；先探测端口再启动测试。
          for _ in range(30):
              try:
                  with socket.create_connection(("localhost", 9092), timeout=1):
                      break
              except OSError:
                  time.sleep(2)
          else:
              print("Kafka service unavailable: localhost:9092", file=sys.stderr)
              raise SystemExit(3)
          PY
      - name: Run unit tests with branch coverage
        run: |
          coverage erase
          coverage run --branch --source src -m pytest tests/unit -q
      - name: Run integration tests
        run: |
          coverage run --append --branch --source src \
            -m pytest tests/integration -q
      - name: Check coverage gate
        run: |
          COVERAGE_INCLUDE=$(python scripts/coverage_source.py \
            --manifest evaluation/manifests/phase16-coverage-source-closure-v1.json \
            --format include)
          coverage json --include "$COVERAGE_INCLUDE"
          python scripts/check_coverage_gate.py \
            --coverage-file coverage.json \
            --source-closure-file evaluation/manifests/phase16-coverage-source-closure-v1.json \
            --line 90 \
            --branch 85
      - name: Run 36 non-holdout release cases
        run: python scripts/run_release_gate.py --mode pr --output-dir artifacts/pr-36-non-holdout
      - name: Check tracked payloads and document encoding
        run: |
          python scripts/check_sensitive_payloads.py --tracked
          python scripts/check_doc_encoding.py --docs-only \
            docs/project_guidance docs/worklog docs/superpowers/specs docs/superpowers/plans
      - name: Upload PR gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase15-pr-gate
          path: artifacts/pr-36-non-holdout
          if-no-files-found: error
          retention-days: 14
