<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveAgent 直播副屏</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1280px;
    height: 800px;
    overflow: hidden;
    font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: grid;
    grid-template-rows: 42px 1.08fr 1fr;
    grid-template-columns: 350px 465px 465px;
  }
  .toolbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 14px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    font-size: 12px;
  }
  .logo { color: #58a6ff; font-weight: 700; font-size: 15px; letter-spacing: 1px; }
  .badge { padding: 2px 8px; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; background: #21262d; }
  .spacer { flex: 1; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #d29922; display: inline-block; }
  .dot.ok { background: #3fb950; }
  .dot.err { background: #f85149; }
  .panel {
    margin: 6px;
    border: 1px solid #30363d;
    border-radius: 8px;
    background: #161b22;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .panel-header {
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid #30363d;
  }
  .panel-header h2 {
    margin: 0;
    font-size: 12px;
    color: #58a6ff;
    letter-spacing: 0;
    font-weight: 700;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; line-height: 1.55; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
  .wide { grid-column: 2 / 4; }
  .btn {
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #21262d;
    color: #c9d1d9;
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .btn:hover { background: #30363d; }
  .btn.primary { border-color: #238636; background: #238636; color: #fff; }
  .btn.danger { border-color: #da3633; background: #da3633; color: #fff; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .muted { color: #8b949e; }
  .empty, .loading, .error { color: #8b949e; text-align: center; padding: 18px 8px; }
  .error { color: #f85149; }
  .section { margin-bottom: 10px; }
  .label { color: #8b949e; font-size: 11px; margin-bottom: 2px; }
  .value { color: #e6edf3; word-break: break-word; }
  .status-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 999px; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; font-size: 11px; }
  .pill.pending { color: #d29922; border-color: #8a6d1d; }
  .pill.done { color: #3fb950; border-color: #2ea043; }
  .pill.err { color: #f85149; border-color: #da3633; }
  .timeline { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .node { padding: 3px 7px; border-radius: 5px; background: #0d1117; border: 1px solid #30363d; color: #8b949e; font-size: 11px; }
  .approval-box { border: 1px solid #8a6d1d; border-left: 4px solid #d29922; border-radius: 8px; background: #0d1117; padding: 10px; margin-bottom: 10px; }
  .approval-actions { display: flex; gap: 8px; margin-top: 10px; }
  .suggestion { border-left: 4px solid #3fb950; background: #0d1117; border-radius: 8px; padding: 10px; margin-bottom: 8px; color: #e6edf3; }
  .list-item { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px; margin-bottom: 6px; }
  .heat { height: 5px; border-radius: 99px; background: #238636; margin-top: 6px; }
  pre {
    margin: 6px 0 0;
    padding: 8px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    font-size: 11px;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="logo">LIVEAGENT</div>
    <span class="badge" id="room-badge">room-dashboard-001</span>
    <span>信任分 <b id="trust-score">0.70</b></span>
    <span>当前链路 <b id="trace-label">未启动</b></span>
    <div class="spacer"></div>
    <span class="dot" id="health-dot"></span>
    <span id="health-text">连接中</span>
    <span id="clock"></span>
  </div>

  <section class="panel">
    <div class="panel-header">
      <h2>讲解手卡</h2>
      <button class="btn" onclick="refreshCard()">刷新</button>
    </div>
    <div class="panel-body" id="card-content"><div class="loading">点击刷新手卡</div></div>
  </section>

  <section class="panel wide">
    <div class="panel-header">
      <h2>Agent Harness / 人审</h2>
      <div>
        <button class="btn" onclick="loadHarnessStatus()">状态</button>
        <button class="btn primary" onclick="startHarness()">启动演示</button>
      </div>
    </div>
    <div class="panel-body" id="harness-content"><div class="empty">尚未启动 Harness Agent 会话</div></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>弹幕洞察</h2>
      <span class="muted" id="danmaku-time">--</span>
    </div>
    <div class="panel-body" id="danmaku-content"><div class="loading">等待弹幕聚合</div></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>实时告警</h2>
      <span class="muted" id="alert-time">--</span>
    </div>
    <div class="panel-body" id="alert-content"><div class="loading">等待告警</div></div>
  </section>

  <section class="panel">
    <div class="panel-header">
      <h2>场次复盘</h2>
      <span class="muted" id="review-time">--</span>
    </div>
    <div class="panel-body" id="review-content"><div class="loading">等待复盘</div></div>
  </section>

<script>
const API = window.location.origin;
const ROOM_ID = "room-dashboard-001";
const WS_URL = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/ws";
let ws = null;
let wsReconnectTimer = null;
let currentTraceId = "";

function escapeHtml(value) {
  return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function fmtTime(value) {
  try { return new Date(value || Date.now()).toLocaleTimeString("zh-CN", { hour12: false }); }
  catch { return "--"; }
}

function setHealth(ok, text) {
  const dot = document.getElementById("health-dot");
  dot.className = ok ? "dot ok" : "dot err";
  document.getElementById("health-text").textContent = text;
}

async function checkHealth() {
  try {
    const res = await fetch(API + "/api/health");
    setHealth(res.ok, res.ok ? "已连接" : "异常");
  } catch {
    setHealth(false, "未连接");
  }
}

function connectWebSocket() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  try {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
      wsReconnectTimer = null;
      setHealth(true, "实时连接");
    };
    ws.onmessage = (event) => {
      try { handleWSMessage(JSON.parse(event.data)); }
      catch (e) { console.error("WS parse error", e); }
    };
    ws.onclose = () => {
      ws = null;
      setHealth(false, "重连中");
      if (!wsReconnectTimer) wsReconnectTimer = setTimeout(connectWebSocket, 3000);
    };
    ws.onerror = () => setHealth(false, "连接异常");
  } catch {
    if (!wsReconnectTimer) wsReconnectTimer = setTimeout(connectWebSocket, 3000);
  }
}

function handleWSMessage(msg) {
  if (msg.type === "agent_harness_update") renderHarness(msg.payload);
  if (msg.type === "danmaku_update") renderDanmaku(msg.payload);
  if (msg.type === "alert_update") renderAlerts(msg.payload);
  if (msg.type === "review_update") renderReview(msg.payload);
}

async function refreshCard(productId) {
  const el = document.getElementById("card-content");
  el.innerHTML = '<div class="loading">加载手卡中</div>';
  try {
    const res = await fetch(API + "/api/card/" + (productId || "p001"));
    const card = await res.json();
    if (!res.ok || card.error) throw new Error(card.error || "请求失败");
    el.innerHTML =
      section("商品", `${escapeHtml(card.title)} (${escapeHtml(card.product_id)})`) +
      section("开场话术", escapeHtml(card.opening_script || "--")) +
      section("讲解要点", formatList(card.talking_points)) +
      section("价格提示", escapeHtml(card.price_hint || "--")) +
      section("风险提示", formatList(card.risk_tips));
  } catch (e) {
    el.innerHTML = '<div class="error">手卡加载失败：' + escapeHtml(e.message) + '</div>';
  }
}

function section(label, value) {
  return '<div class="section"><div class="label">' + label + '</div><div class="value">' + value + '</div></div>';
}

function formatList(items) {
  if (!items || items.length === 0) return "--";
  return Array.isArray(items) ? items.map(item => "· " + escapeHtml(item)).join("<br>") : escapeHtml(items);
}

async function startHarness() {
  const traceId = "trace-web-" + Date.now();
  document.getElementById("harness-content").innerHTML = '<div class="loading">启动 Harness Agent 中</div>';
  try {
    const res = await fetch(API + "/api/agent/harness/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ room_id: ROOM_ID, trace_id: traceId, anchor_id: "anchor-demo" })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "启动失败");
    renderHarness(data);
  } catch (e) {
    document.getElementById("harness-content").innerHTML = '<div class="error">启动失败：' + escapeHtml(e.message) + '</div>';
  }
}

async function loadHarnessStatus() {
  if (!currentTraceId) return;
  try {
    const res = await fetch(API + "/api/agent/harness/status?trace_id=" + encodeURIComponent(currentTraceId));
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "读取失败");
    renderHarness(data);
  } catch (e) {
    document.getElementById("harness-content").innerHTML = '<div class="error">状态读取失败：' + escapeHtml(e.message) + '</div>';
  }
}

async function submitApproval(decision) {
  if (!currentTraceId || !window.latestHarnessPayload) return;
  const payload = window.latestHarnessPayload.interrupt_payload || {};
  const reason = decision === "approved" ? "副屏人工批准执行" : "副屏人工拒绝执行";
  try {
    const res = await fetch(API + "/api/agent/harness/approval", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        trace_id: currentTraceId,
        room_id: ROOM_ID,
        tool_name: payload.tool_name,
        decision,
        operator_id: "dashboard-operator",
        reason
      })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "审批失败");
    renderHarness(data);
  } catch (e) {
    document.getElementById("harness-content").innerHTML += '<div class="error">审批失败：' + escapeHtml(e.message) + '</div>';
  }
}

function renderHarness(data) {
  if (!data) return;
  window.latestHarnessPayload = data;
  currentTraceId = data.trace_id || currentTraceId;
  document.getElementById("trace-label").textContent = currentTraceId || "未启动";
  const statusClass = data.pending_approval ? "pending" : (data.status === "error" ? "err" : "done");
  const nodes = (data.completed_nodes || []).map(n => '<span class="node">' + escapeHtml(n) + '</span>').join("");
  const payload = data.interrupt_payload || {};
  let approval = "";
  if (data.pending_approval) {
    approval =
      '<div class="approval-box">' +
        '<div class="label">等待人工审批</div>' +
        '<div class="value">工具：' + escapeHtml(payload.tool_name || "--") + ' / 风险：' + escapeHtml(payload.risk_level || "--") + '</div>' +
        '<pre>' + escapeHtml(JSON.stringify(payload.tool_arguments || {}, null, 2)) + '</pre>' +
        '<div class="muted">' + escapeHtml(payload.context_summary || "") + '</div>' +
        '<div class="approval-actions">' +
          '<button class="btn primary" onclick="submitApproval(\'approved\')">批准</button>' +
          '<button class="btn danger" onclick="submitApproval(\'rejected\')">拒绝</button>' +
        '</div>' +
      '</div>';
  }
  const suggestion = data.final_suggestion ? '<div class="suggestion">' + escapeHtml(data.final_suggestion) + '</div>' : "";
  document.getElementById("harness-content").innerHTML =
    '<div class="status-row">' +
      '<span class="pill ' + statusClass + '">' + escapeHtml(data.status || "--") + '</span>' +
      '<span class="pill">agent: ' + escapeHtml(data.agent_status || "--") + '</span>' +
      '<span class="pill">audit: ' + escapeHtml(data.audit_status || "--") + '</span>' +
    '</div>' +
    section("Trace", escapeHtml(data.trace_id || "--")) +
    approval +
    section("LangGraph 节点路径", '<div class="timeline">' + nodes + '</div>') +
    suggestion +
    section("工具执行", renderMiniList(data.executed_tools, "tool_name")) +
    section("观察结果", renderMiniList(data.observations, "summary"));
}

function renderMiniList(items, field) {
  if (!items || items.length === 0) return '<span class="muted">暂无</span>';
  return items.map(item => '<div class="list-item">' + escapeHtml(item[field] || item.tool_name || JSON.stringify(item)) + '</div>').join("");
}

function renderDanmaku(data) {
  const groups = data.question_groups || [];
  document.getElementById("danmaku-time").textContent = (data.danmaku_count || 0) + " 条";
  if (groups.length === 0) {
    document.getElementById("danmaku-content").innerHTML = '<div class="empty">暂无弹幕聚合</div>';
    return;
  }
  const maxCount = Math.max(...groups.map(g => g.count || 1), 1);
  document.getElementById("danmaku-content").innerHTML = groups.map(g => {
    const pct = Math.round(((g.count || 0) / maxCount) * 100);
    return '<div class="list-item"><b>' + escapeHtml(g.question || g.category || "") + '</b><span class="muted"> · ' + (g.count || 0) + ' 次</span><div class="heat" style="width:' + pct + '%"></div></div>';
  }).join("");
}

function renderAlerts(data) {
  const alerts = data.alerts || [];
  document.getElementById("alert-time").textContent = alerts.length + " 条";
  document.getElementById("alert-content").innerHTML = alerts.length
    ? alerts.map(a => '<div class="list-item"><b>' + escapeHtml(a.type) + '</b><br>' + escapeHtml(a.message || "") + '</div>').join("")
    : '<div class="empty">暂无告警</div>';
}

function renderReview(data) {
  const s = data.structured || {};
  document.getElementById("review-time").textContent = (data.decision_count || 0) + " 条决策";
  document.getElementById("review-content").innerHTML =
    section("总决策", escapeHtml(s.total_decisions ?? 0)) +
    section("采纳率 / 准确率", escapeHtml((s.adoption_rate || "0") + " / " + (s.accuracy_rate || "0"))) +
    section("LLM 复盘", escapeHtml(data.summary || "暂无复盘"));
}

async function initFallback() {
  refreshCard("p001");
  try { const r = await fetch(API + "/api/danmaku/summary?room_id=" + ROOM_ID); if (r.ok) renderDanmaku(await r.json()); } catch {}
  try { const r = await fetch(API + "/api/alert/" + ROOM_ID); if (r.ok) renderAlerts(await r.json()); } catch {}
  try { const r = await fetch(API + "/api/review/llm/" + ROOM_ID); if (r.ok) renderReview(await r.json()); } catch {}
}

setInterval(() => {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });
}, 1000);
checkHealth();
setInterval(checkHealth, 15000);
connectWebSocket();
initFallback();
</script>
</body>
</html>
